services:
  backend:

    build:
      context: ./backend

    container_name: docsense-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./backend/data:/app/data
      
  frontend:
    build:
      context: ./frontend

    container_name: docsense-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend